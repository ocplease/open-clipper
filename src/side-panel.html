<!DOCTYPE html>
<html id="saved-clips-panel" class="is-side-panel">
	<head>
		<title data-i18n="clipLibraryTitle">Open Clipper</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<link rel="stylesheet" href="style.css">
		<script src="browser-polyfill.min.js"></script>
	</head>
	<body class="clip-library">

		<section class="library-toolbar" aria-label="Clip filters">
			<label class="library-search">
				<i data-lucide="search" aria-hidden="true"></i>
				<input id="clip-search" type="search" data-i18n="searchClipsPlaceholder" autocomplete="off">
			</label>
			<select id="clip-filter" data-i18n-title="filterClips" aria-label="Filter clips">
				<option value="all" data-i18n="allClips">All clips</option>
				<option value="current-site" data-i18n="currentSiteClips">Current site</option>
			</select>
		</section>

		<div id="library-status" class="library-status" role="status" aria-live="polite"></div>
		<main id="clip-feed" class="clip-feed" aria-live="polite"></main>

		<footer class="library-footer">
			<button id="clip-current-page" class="library-action mod-cta" type="button">
				<i data-lucide="paperclip"></i>
				<span data-i18n="clipCurrentPage">Clip current page</span>
			</button>
			<button id="copy-selected-clips" class="library-action" type="button" disabled>
				<i data-lucide="copy"></i>
				<span id="copy-selected-label" data-i18n="copySelected">Copy selected</span>
			</button>
		</footer>
		<script type="module" src="side-panel.js"></script>
	</body>
</html>
